<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel del Técnico | Taller Automotriz</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }
    header {
      background: linear-gradient(135deg,#020617,#111827);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }
    header h1 {
      margin: 0;
      font-size: 26px;
    }
    header p {
      color: #cbd5e1;
      margin-top: 6px;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 16px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,.25);
    }
    h2 {
      margin-top: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media(max-width:800px){
      .grid { grid-template-columns: 1fr; }
    }
    label {
      display:block;
      margin-top:12px;
      font-size:13px;
      font-weight:bold;
      color:#cbd5e1;
    }
    input, textarea, select {
      width:100%;
      padding:11px;
      margin-top:5px;
      border-radius:10px;
      border:1px solid #475569;
      background:#0f172a;
      color:white;
      font-size:15px;
    }
    textarea {
      min-height:90px;
      resize:vertical;
    }
    button {
      border:none;
      border-radius:10px;
      padding:12px 14px;
      margin-top:14px;
      cursor:pointer;
      font-weight:bold;
      background:#22c55e;
      color:#020617;
    }
    button.secondary { background:#38bdf8; }
    button.warning { background:#facc15; }
    .job {
      background:#0f172a;
      border:1px solid #334155;
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
    }
    .status {
      display:inline-block;
      margin-top:6px;
      background:#334155;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
    }
    .note {
      background:#0f172a;
      border-left:4px solid #22c55e;
      padding:10px;
      border-radius:8px;
      color:#cbd5e1;
      font-size:13px;
      margin-bottom:14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Panel del Técnico</h1>
    <p>Diagnóstico, piezas, mano de obra, tiempos y registro interno del taller.</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>Entrada del Técnico</h2>
      

      <form id="techForm">
        

        <div class="grid">
          <div>
            <label>Mecánico Asignado</label>
            <select id="customer">
              <option>Michael</option>
              <option>Andres</option>
              <option>Otro</option>
            </select>
            <input id="otherMechanic" placeholder="Nombre del mecánico" style="display:none; margin-top:8px;">
          </div>

          <div>
            <label>Año del Vehículo</label>
            <select id="vehicleYear" required></select>
          </div>
        </div>

        <div class="grid">
          <div>
            <label>Marca</label>
            <select id="vehicleMake" required></select>
          </div>

          <div>
            <label>Modelo</label>
            <select id="vehicleModel" required></select>
          </div>
        </div>

        <div class="grid">
          <div>
            <label>Sub-línea / Versión</label>
            <input id="vehicleTrim" placeholder="Sub-línea / versión">
          </div>

          <div>
            <label>Vehículo Completo</label>
            <input id="vehicle" placeholder="Se llena automático" readonly>
          </div>
        </div>

        <label>Diagnóstico</label>
        <textarea id="diagnosis" placeholder="Diagnóstico"></textarea>

        <label>Piezas Necesarias / Instaladas</label>
        <textarea id="parts" placeholder="Piezas utilizadas"></textarea>

        <label>Trabajo Realizado</label>
        <textarea id="labor" placeholder="Trabajo realizado"></textarea>

        

        <label>Notas Internas</label>
        <textarea id="notes" placeholder="Notas internas"></textarea>

        <button type="submit">Guardar Registro Técnico</button>
      </form>
    </div>

    <div class="card">
      <h2>Registros Técnicos Guardados</h2>
      <div id="jobList"></div>
    </div>

  </div>

  <script>
    const STORAGE_KEY = 'mechanicTechInputSystem';
    let jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    function saveJobs() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
      renderJobs();
    }

    function now() {
      return new Date().toLocaleString('es-PR');
    }

    document.getElementById('techForm').addEventListener('submit', function(e){
      e.preventDefault();

      const job = {
        id: Date.now(),
        createdAt: now(),
        
        customer: getMechanicName(),
        vehicle: value('vehicle'),
        diagnosis: value('diagnosis'),
        parts: value('parts'),
        labor: value('labor'),
        
        vehicleYear: value('vehicleYear'),
        vehicleMake: value('vehicleMake'),
        vehicleModel: value('vehicleModel'),
        vehicleTrim: value('vehicleTrim'),
        notes: value('notes')
      };

      jobs.unshift(job);
      this.reset();
      document.getElementById('otherMechanic').style.display = 'none';
      clearModelDropdown();
      updateVehicleFullName();
      saveJobs();
    });

    function value(id){
      return document.getElementById(id).value.trim();
    }

      const selected = value('customer');
      if(selected === 'Otro'){
        return value('otherMechanic') || 'Otro';
      }
      return selected;

    function setupVehicleDropdowns(){
      const yearSelect = document.getElementById('vehicleYear');
      const makeSelect = document.getElementById('vehicleMake');
      const modelSelect = document.getElementById('vehicleModel');

      clearModelDropdown();

      yearSelect.innerHTML = '<option value="">Seleccione año</option>';
      const currentYear = new Date().getFullYear() + 1;
      for(let y = currentYear; y >= 1980; y--){
        yearSelect.innerHTML += `<option>${y}</option>`;
      }

      makeSelect.innerHTML = '<option value="">Seleccione marca</option>';
      Object.keys(vehicleData).sort().forEach(make => {
        makeSelect.innerHTML += `<option>${make}</option>`;
      });

      makeSelect.addEventListener('change', updateModelDropdown);
      document.getElementById('customer').addEventListener('change', toggleOtherMechanic);
      yearSelect.addEventListener('change', updateVehicleFullName);
      modelSelect.addEventListener('change', updateVehicleFullName);
      document.getElementById('vehicleTrim').addEventListener('input', updateVehicleFullName);
    }

    function clearModelDropdown(){
      const modelSelect = document.getElementById('vehicleModel');
      modelSelect.innerHTML = '<option value="">Seleccione marca primero</option>';
    }

    function toggleOtherMechanic(){
      const otherInput = document.getElementById('otherMechanic');
      otherInput.style.display = value('customer') === 'Otro' ? 'block' : 'none';
      if(value('customer') !== 'Otro') otherInput.value = '';
    }

    function updateModelDropdown(){
      const make = value('vehicleMake');
      const modelSelect = document.getElementById('vehicleModel');
      modelSelect.innerHTML = '<option value="">Seleccione modelo</option>';

      if(vehicleData[make]){
        vehicleData[make].forEach(model => {
          modelSelect.innerHTML += `<option>${model}</option>`;
        });
      }

      modelSelect.innerHTML += '<option>Otro / Manual</option>';
      updateVehicleFullName();
    }

    function updateVehicleFullName(){
      const year = value('vehicleYear');
      const make = value('vehicleMake');
      const model = value('vehicleModel');
      const trim = value('vehicleTrim');
      document.getElementById('vehicle').value = [year, make, model, trim].filter(Boolean).join(' ');
    }

    function renderJobs(){
      const list = document.getElementById('jobList');
      list.innerHTML = '';

      if(jobs.length === 0){
        list.innerHTML = '<p style="color:#94a3b8;">No hay registros técnicos guardados.</p>';
        return;
      }

      jobs.forEach(job => {
        const div = document.createElement('div');
        div.className = 'job';

        div.innerHTML = `
          <strong>Registro Técnico</strong><br><br>
          <b>Mecánico:</b> ${escapeHtml(job.customer)}<br>
          <b>Vehículo:</b> ${escapeHtml(job.vehicle)}<br>
          

          <hr style="border:none;border-top:1px solid #334155;margin:12px 0;">

          <b>Diagnóstico:</b><br>
          <p>${escapeHtml(job.diagnosis)}</p>

          <b>Piezas:</b><br>
          <p>${escapeHtml(job.parts)}</p>

          <b>Trabajo Realizado:</b><br>
          <p>${escapeHtml(job.labor)}</p>

          <b>Notas Internas:</b><br>
          <p>${escapeHtml(job.notes)}</p>

          <small style="color:#94a3b8;">Registro creado: ${job.createdAt}</small>
        `;

        list.appendChild(div);
      });
    }

    function escapeHtml(text){
      return String(text || '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'", '&#039;');
    }

    setupVehicleDropdowns();
    renderJobs();
  </script>

</html>
