<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Shop Intake System</title>
<style>
:root{
--bg:#0f172a;--card:#111827;--text:#f9fafb;--muted:#9ca3af;
--accent:#22c55e;--danger:#ef4444;--border:#374151;
}
*{box-sizing:border-box}
body{
margin:0;font-family:Arial;background:linear-gradient(180deg,#020617,var(--bg));
color:var(--text);padding:16px;
}
.app{max-width:1000px;margin:auto}
.card{
background:rgba(17,24,39,.95);
border:1px solid var(--border);
border-radius:18px;
padding:16px;
margin-bottom:14px;
}
h1,h2{margin-top:0}
.grid{display:grid;gap:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
input,textarea,select{
width:100%;padding:12px;border-radius:12px;
border:1px solid var(--border);
background:#020617;color:white;margin-bottom:12px;
}
button{
padding:12px;border:none;border-radius:12px;
font-weight:bold;cursor:pointer;
background:var(--accent);
}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.photo-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
}
.photo-grid img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
border:1px solid var(--border);
}
@media(max-width:760px){
.row,.row3{grid-template-columns:1fr}
.actions{flex-direction:column}
button{width:100%}
}
</style>
</head>
<body>
<div class="app">

<h1>Auto Shop Intake System</h1>

<div class="card">
<h2>👤 Customer Info</h2>

<label>Customer Name</label>
<input id="customerName">

<label>Phone</label>
<input id="customerPhone">

<label>Email</label>
<input id="customerEmail">
</div>

<div class="card">
<h2>🚗 Vehicle Info</h2>

<div class="row3">
<div>
<label>Year</label>
<input id="year">
</div>

<div>
<label>Brand</label>
<input id="make">
</div>

<div>
<label>Model</label>
<input id="model">
</div>
</div>

<label>Take VIN Photo</label>
<input id="vinPhoto" type="file" accept="image/*" capture="environment">

<div class="row">
<div>
<label>Plate</label>
<input id="plate">
</div>

<div>
<label>Mileage</label>
<input id="mileage" type="number">
</div>
</div>

<label>Fuel Level</label>
<select id="fuel">
<option>Empty</option>
<option>1/4</option>
<option>1/2</option>
<option>3/4</option>
<option>Full</option>
</select>
</div>

<div class="card">
<h2>🛠️ Customer Complaint</h2>
<textarea id="complaint"></textarea>
</div>

<div class="card">
<h2>📸 Damage / Vehicle Photos</h2>

<label>Dents / Damage Comments</label>
<textarea id="damage"></textarea>

<label>Upload Vehicle Photos</label>
<input id="photos" type="file" accept="image/*" capture="environment" multiple>

<div class="photo-grid" id="preview"></div>
</div>

<div class="card">
<h2>✅ Actions</h2>

<div class="actions">
<button onclick="saveData()">Save Intake</button>
<button onclick="window.print()">Print / Save PDF</button>
<button onclick="clearForm()" style="background:var(--danger);color:white;">Clear</button>
</div>
</div>

</div>

<script>
let photoData=[];

document.getElementById('photos').addEventListener('change', async(e)=>{
const files=[...e.target.files];

for(const file of files){
const base64=await toBase64(file);
photoData.push(base64);
}

renderPhotos();
});

function toBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(file);
});
}

function renderPhotos(){
const preview=document.getElementById('preview');
preview.innerHTML='';

photoData.forEach(photo=>{
const img=document.createElement('img');
img.src=photo;
preview.appendChild(img);
});
}

function saveData(){
const data={
customerName:document.getElementById('customerName').value,
customerPhone:document.getElementById('customerPhone').value,
customerEmail:document.getElementById('customerEmail').value,
year:document.getElementById('year').value,
make:document.getElementById('make').value,
model:document.getElementById('model').value,
plate:document.getElementById('plate').value,
mileage:document.getElementById('mileage').value,
fuel:document.getElementById('fuel').value,
complaint:document.getElementById('complaint').value,
damage:document.getElementById('damage').value,
photos:photoData
};

localStorage.setItem('autoShopIntake',JSON.stringify(data));

alert('Intake Saved');
}

function clearForm(){
location.reload();
}
</script>

</body>
</html>
