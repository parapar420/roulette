<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Shop Intake System</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #020617, var(--bg));
      color: var(--text);
      padding: 14px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 25px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      background: var(--accent);
      color: #02130a;
    }

    button.secondary {
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.warning {
      background: var(--warning);
      color: #1f1300;
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    .badge {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 13px;
    }

    .card {
      background: rgba(17,24,39,0.96);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.22);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 0;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .photo-card {
      border: 1px solid var(--border);
      background: #020617;
      border-radius: 12px;
      padding: 8px;
    }

    .photo-card img {
      width: 100%;
      height: 95px;
      object-fit: cover;
      border-radius: 9px;
      display: block;
    }

    .photo-card small {
      display: block;
      color: var(--muted);
      margin-top: 6px;
      font-size: 12px;
    }

    .saved-item {
      border: 1px solid var(--border);
      background: #020617;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .saved-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .saved-sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .report {
      display: none;
      background: white;
      color: black;
      border-radius: 12px;
      padding: 22px;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Auto Shop Intake System</h1>
        <div class="hint">Vehicle intake before mechanic receives the car</div>
      </div>
      <div class="badge" id="jobBadge">New Intake</div>
    </header>

    <section class="card">
      <h2>👤 Customer Info</h2>

      <label>Customer Name</label>
      <input id="customerName" placeholder="Customer name" />

      <label>ID #</label>
      <input id="customerId" placeholder="Customer ID / License #" />

      <label>Phone</label>
      <input id="customerPhone" placeholder="787-000-0000" />

      <label>Email</label>
      <input id="customerEmail" placeholder="customer@email.com" />
    </section>

    <section class="card">
      <h2>🚗 Vehicle Info</h2>

      <div class="row3">
        <div>
          <label>Year</label>
          <input id="year" placeholder="2018" />
        </div>

        <div>
          <label>Brand / Make</label>
          <input id="make" placeholder="Toyota" />
        </div>

        <div>
          <label>Model</label>
          <input id="model" placeholder="Corolla" />
        </div>
      </div>

      <label>Take VIN Photo</label>
      <input id="vinPhoto" type="file" accept="image/*" capture="environment" />

      <div class="row">
        <div>
          <label>License Plate</label>
          <input id="plate" placeholder="ABC-123" />
        </div>

        <div>
          <label>Mileage</label>
          <input id="mileage" type="number" placeholder="95000" />
        </div>
      </div>
    </section>

    <script>
      let currentJobId = makeJobId();

      const fields = [
        "customerName",
        "customerId",
        "customerPhone",
        "customerEmail",
        "year",
        "make",
        "model",
        "plate",
        "mileage",
        "complaint",
        "damage"
      ];
    </script>
  </div>
</body>
</html>
